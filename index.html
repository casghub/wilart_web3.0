<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Wilart — премиальная мебель для гостиниц и HoReCa на заказ от производителя">
    <title>Wilart — Премиальная мебель для гостиниц и HoReCa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#0a0a0a',
                            dark: '#111111',
                            darker: '#1a1a1a',
                            red: '#c41a20',
                            'red-accent': '#e31e25',
                            gold: '#b8956a',
                            'gold-light': '#d4b896',
                            white: '#ffffff',
                            cream: '#f8f6f3',
                            gray: '#888888',
                            'gray-light': '#cccccc',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    spacing: {
                        '18': '4.5rem',
                        '22': '5.5rem',
                        '30': '7.5rem',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* ============================================
           PREMIUM PRELOADER
           ============================================ */
        #preloader {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #111111;
            overflow: hidden;
            transition: opacity 0.6s cubic-bezier(0.77, 0, 0.175, 1);
        }
        #preloader.hidden-preloader {
            opacity: 0;
            pointer-events: none;
        }

        .split-bg {
            position: absolute;
            inset: 0;
            display: flex;
            z-index: 1;
        }
        .split-left {
            width: 50%;
            height: 100%;
            background: #111111;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .split-right {
            width: 50%;
            height: 100%;
            background: #ffffff;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1);
        }
        #preloader.split .split-left {
            transform: translateX(-100%);
        }
        #preloader.split .split-right {
            transform: translateX(100%);
        }

        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        .preloader-logo {
            height: 72px;
            width: auto;
            object-fit: contain;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            filter: brightness(0) invert(1);
        }
        .preloader-logo.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .preloader-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #888888;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .preloader-subtitle.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 0;
            height: 2px;
            background: #d91e25;
            z-index: 5;
            transform: translateY(-50%);
            transition: width 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        #preloader.reveal .reveal-line {
            width: 100%;
        }

        .hero-section {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .hero-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #mainNav {
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        #mainNav.visible {
            opacity: 1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-60px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(60px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(196, 26, 32, 0.3); }
            50% { border-color: rgba(196, 26, 32, 0.8); }
        }
        @keyframes count-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes line-expand {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes contentReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeInUp { animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fadeIn { animation: fadeIn 1.2s ease-out forwards; }
        .animate-slideInLeft { animation: slideInLeft 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slideInRight { animation: slideInRight 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-scaleIn { animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-float { animation: float 6s ease-in-out infinite; }

        .reveal {
            opacity: 0;
            transform: translateY(60px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }
        .reveal-delay-5 { transition-delay: 0.5s; }
        .reveal-delay-6 { transition-delay: 0.6s; }

        .font-serif { font-family: 'Playfair Display', serif; }
        .text-balance { text-wrap: balance; }
        
        .premium-card {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .premium-card:hover {
            transform: translateY(-12px);
        }
        .premium-card:hover .card-image {
            transform: scale(1.05);
        }
        .premium-card:hover .card-overlay {
            opacity: 1;
        }
        
        .card-image {
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card-overlay {
            transition: opacity 0.6s ease;
        }

        .line-accent {
            height: 1px;
            background: linear-gradient(90deg, transparent, #c41a20, transparent);
        }
        .line-vertical {
            width: 1px;
            background: linear-gradient(180deg, transparent, #c41a20, transparent);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-premium {
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            min-height: 44px;
        }
        .btn-premium::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.6s;
        }
        .btn-premium:hover::before { left: 100%; }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(196, 26, 32, 0.3);
        }

        .counter-value {
            opacity: 0;
            transform: translateY(20px);
        }
        .counter-value.visible {
            opacity: 1;
            transform: translateY(0);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-link {
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: #c41a20;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }

        .img-placeholder {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 50%, #1a1a1a 100%);
            position: relative;
            overflow: hidden;
        }
        .img-placeholder::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }

        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .magnetic-btn {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sticky-cta {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sticky-cta.visible {
            transform: translateY(0);
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .marquee-track {
            animation: marquee 30s linear infinite;
        }

        .img-reveal {
            clip-path: inset(0 100% 0 0);
            transition: clip-path 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .img-reveal.visible {
            clip-path: inset(0 0% 0 0);
        }

        /* Video Hero Styles */
        .video-hero {
            position: relative;
            min-height: 100vh;
            overflow: hidden;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.05);
            will-change: transform;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg, 
                rgba(10, 10, 10, 0.85) 0%, 
                rgba(10, 10, 10, 0.6) 50%, 
                rgba(10, 10, 10, 0.75) 100%
            );
            z-index: 1;
        }

        .video-overlay::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(10, 10, 10, 0.9), transparent);
        }

        .video-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-top: 80px;
        }

        .content-reveal {
            opacity: 0;
            transform: translateY(40px);
            animation: contentReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .content-reveal.delay-1 { animation-delay: 0.3s; }
        .content-reveal.delay-2 { animation-delay: 0.5s; }
        .content-reveal.delay-3 { animation-delay: 0.7s; }

        /* ============================================
           MOBILE ADAPTATIONS
           ============================================ */
        @media (max-width: 768px) {
            .video-overlay {
                background: linear-gradient(
                    135deg, 
                    rgba(10, 10, 10, 0.9) 0%, 
                    rgba(10, 10, 10, 0.75) 100%
                );
            }
            
            .video-content {
                padding-top: 100px;
                padding-bottom: 60px;
            }
            
            .preloader-logo { 
                height: 56px; 
            }
            .preloader-subtitle { 
                font-size: 9px; 
                letter-spacing: 0.3em; 
            }
            
            .logo-container {
                gap: 16px;
            }
        }

        @media (max-width: 1024px) {
            .hero-grid { grid-template-columns: 1fr !important; }
            .hero-visual { display: none !important; }
        }

        /* Touch-friendly improvements */
        @media (hover: none) and (pointer: coarse) {
            .premium-card:hover {
                transform: none;
            }
            .premium-card:hover .card-image {
                transform: none;
            }
            .premium-card:hover .card-overlay {
                opacity: 1;
            }
            .btn-premium:hover {
                transform: none;
            }
        }

        /* Prevent horizontal scroll on mobile */
        html, body {
            overflow-x: hidden;
            max-width: 100vw;
        }

        /* Improve tap targets */
        a, button {
            min-height: 44px;
            min-width: 44px;
        }

        /* Fix iOS viewport height */
        @supports (-webkit-touch-callout: none) {
            .video-hero {
                min-height: -webkit-fill-available;
            }
        }
    </style>
</head>
<body>

   <!-- ============================================
        PREMIUM PRELOADER
        ============================================ -->
<div id="preloader">
    <div class="split-bg">
        <div class="split-left"></div>
        <div class="split-right"></div>
    </div>
    <div class="logo-container">
        <img src="assets/Лого.png" alt="Wilart" class="preloader-logo" id="preloaderLogo">
        <span class="preloader-subtitle" id="preloaderSubtitle">Производственная компания</span>
    </div>
    <div class="reveal-line"></div>
</div>

    <!-- Navigation -->
    <nav id="mainNav" class="fixed top-0 left-0 w-full z-50 transition-all duration-500">
        <div class="max-w-[1440px] mx-auto pxmax-w-[1440px] mx-auto px
